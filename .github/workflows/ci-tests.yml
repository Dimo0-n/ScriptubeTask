name: CI Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      area:
        description: "Test area to run"
        required: false
        default: "all"
        type: choice
        options: [all, api, ui, webhook]
      suite:
        description: "Test suite to run"
        required: false
        default: "smoke"
        type: choice
        options: [smoke, regression]
      threads:
        description: "Parallel threads"
        required: false
        default: "2"
        type: choice
        options: ["1", "2", "4"]

permissions:
  contents: write
  pages: write
  id-token: write

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  SCRIPTUBE_API_KEY: ${{ secrets.SCRIPTUBE_API_KEY }}
  SCRIPTUBE_EMAIL: ${{ secrets.SCRIPTUBE_EMAIL }}
  SCRIPTUBE_PASSWORD: ${{ secrets.SCRIPTUBE_PASSWORD }}
  RUN_LIVE_API: "true"
  RUN_LIVE_WEBHOOKS: "true"
  RUN_LIVE_UI: "true"

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore dependencies
        run: dotnet restore Scriptube.Tests.sln

      - name: Verify code format
        run: dotnet format Scriptube.Tests.sln --verify-no-changes --verbosity diagnostic

      - name: Build (warnings as errors)
        run: dotnet build Scriptube.Tests.sln --configuration Release --no-restore --warnaserror

      - name: Install Playwright browsers
        run: |
          pwsh tests/Scriptube.Tests.Ui/bin/Release/net10.0/playwright.ps1 install --with-deps chromium

      - name: Compute test filter and options
        id: computed
        run: |
          # Determine parameters based on trigger
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            AREA="${{ inputs.area }}"
            SUITE="${{ inputs.suite }}"
            THREADS="${{ inputs.threads }}"
          elif [ "${{ github.event_name }}" = "push" ]; then
            AREA="all"
            SUITE="smoke"
            THREADS="2"
          else
            # pull_request → full regression
            AREA="all"
            SUITE="regression"
            THREADS="2"
          fi

          # Build NUnit filter expression
          FILTER_PARTS=()
          if [ "$AREA" != "all" ]; then
            case "$AREA" in
              api)     FILTER_PARTS+=("Category=API") ;;
              ui)      FILTER_PARTS+=("Category=UI") ;;
              webhook) FILTER_PARTS+=("Category=Webhook") ;;
            esac
          fi
          case "$SUITE" in
            smoke)      FILTER_PARTS+=("Category=Smoke") ;;
            regression) FILTER_PARTS+=("Category=Regression") ;;
          esac

          if [ ${#FILTER_PARTS[@]} -gt 0 ]; then
            FILTER=$(IFS='&'; echo "${FILTER_PARTS[*]}")
          else
            FILTER=""
          fi

          echo "filter=$FILTER"   >> "$GITHUB_OUTPUT"
          echo "threads=$THREADS" >> "$GITHUB_OUTPUT"
          echo "area=$AREA"       >> "$GITHUB_OUTPUT"
          echo "suite=$SUITE"     >> "$GITHUB_OUTPUT"

      - name: Run tests
        run: |
          FILTER="${{ steps.computed.outputs.filter }}"
          THREADS="${{ steps.computed.outputs.threads }}"

          DOTNET_ARGS=(
            "test" "Scriptube.Tests.sln"
            "--configuration" "Release"
            "--no-build"
            "--logger" "trx;LogFileName=results.trx"
            "--results-directory" "TestResults"
            "-m:${THREADS}"
          )

          if [ -n "$FILTER" ]; then
            DOTNET_ARGS+=("--filter" "$FILTER")
          fi

          dotnet "${DOTNET_ARGS[@]}"

      - name: Upload test results (TRX)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-trx
          path: TestResults/**/*.trx
          retention-days: 30

      - name: Upload screenshots (UI failures)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ui-screenshots
          path: TestResults/ui-screenshots/
          retention-days: 30
          if-no-files-found: ignore

      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: allure-results/
          retention-days: 30
          if-no-files-found: ignore

  allure-report:
    name: Publish Allure Report
    runs-on: ubuntu-latest
    needs: test
    if: always() && (github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch')

    steps:
      - name: Checkout gh-pages history
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: gh-pages
        continue-on-error: true

      - name: Download Allure results
        uses: actions/download-artifact@v4
        with:
          name: allure-results
          path: allure-results
        continue-on-error: true

      - name: Generate Allure report
        uses: simple-elf/allure-report-action@v1.7
        with:
          allure_results: allure-results
          gh_pages: gh-pages
          allure_report: allure-report
          allure_history: allure-history
          keep_reports: 20
        continue-on-error: true

      - name: Deploy report to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: allure-history
          keep_files: true
